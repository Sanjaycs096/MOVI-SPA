services:
  - type: web
    name: movicloud-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000

staticSites:
  - name: movicloud-web
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
